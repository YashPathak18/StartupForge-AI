server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/startupforge
    username: startupforge
    password: startupforge
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework: INFO
    com.startupforge: DEBUG